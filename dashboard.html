<!DOCTYPE html>
<html>
<head>
    <title>EcoCash ERM System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        h1, h2 { text-align: center; }

        .center {
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 8px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        .hidden { display: none; }

        .cards {
            display: flex;
            gap: 10px;
            margin: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        .high { background: red; }
        .medium { background: orange; }
        .low { background: green; }
        .total { background: blue; }

        ul {
            background: white;
            margin: 20px;
            padding: 10px;
            list-style: none;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

    <h1>EcoCash ERM System</h1>

    <!-- NAVIGATION -->
    <div style="text-align:center;">
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('add')">Add Risk</button>
        <button onclick="showSection('manage')">Manage Risks</button>
        <button onclick="showSection('audit')">Audit Logs</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection">

        <div class="cards">
            <div class="card total" id="totalCard">Total</div>
            <div class="card high" id="highCard">High</div>
            <div class="card medium" id="mediumCard">Medium</div>
            <div class="card low" id="lowCard">Low</div>
        </div>

        <canvas id="barChart"></canvas>
        <canvas id="heatmapChart"></canvas>

        <div style="text-align:center;">
            <button onclick="downloadReport()">Download Report</button>
        </div>

    </div>

    <!-- ADD RISK -->
    <div id="addSection" class="hidden center">
        <h2>Add Risk</h2>
        <input id="category" placeholder="Category"><br>
        <input id="description" placeholder="Description"><br>
        <input id="likelihood" type="number" placeholder="Likelihood"><br>
        <input id="impact" type="number" placeholder="Impact"><br>
        <button onclick="addRisk()">Add Risk</button>
    </div>

    <!-- MANAGE RISKS -->
    <div id="manageSection" class="hidden">
        <h2>Manage Risks</h2>
        <ul id="manageList"></ul>
    </div>

    <!-- AUDIT LOGS -->
    <div id="auditSection" class="hidden">
        <h2>Audit Logs</h2>
        <ul id="auditList"></ul>
    </div>

</div>

<script>

const API_URL = "https://telecomerm-2.onrender.com";

let TOKEN = "";
let barChart;

async function login() {
    const res = await fetch(API_URL + "/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    TOKEN = "Bearer " + data.access_token;

    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    loadDashboard();
}

// NAVIGATION
function showSection(section) {
    ["dashboardSection","addSection","manageSection","auditSection"]
        .forEach(id => document.getElementById(id).classList.add("hidden"));

    if (section === "dashboard") {
        dashboardSection.classList.remove("hidden");
    } else if (section === "add") {
        addSection.classList.remove("hidden");
    } else if (section === "manage") {
        manageSection.classList.remove("hidden");
        loadManageRisks();
    } else if (section === "audit") {
        auditSection.classList.remove("hidden");
        loadAuditLogs();
    }
}

// DASHBOARD
async function loadDashboard() {
    const res = await fetch(API_URL + "/risks/summary", {
        headers: { Authorization: TOKEN }
    });

    const data = await res.json();

    totalCard.innerText = "Total: " + data.total_risks;
    highCard.innerText = "High: " + data.high_risks;
    mediumCard.innerText = "Medium: " + data.medium_risks;
    lowCard.innerText = "Low: " + data.low_risks;

    if (barChart) barChart.destroy();

    barChart = new Chart(barChart = document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: ["High","Medium","Low"],
            datasets: [{
                data: [data.high_risks,data.medium_risks,data.low_risks],
                backgroundColor: ["red","orange","green"]
            }]
        }
    });

    drawHeatmap();
}

// ADD RISK
async function addRisk() {
    await fetch(API_URL + "/risks/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: TOKEN
        },
        body: JSON.stringify({
            risk_category: category.value,
            risk_description: description.value,
            likelihood: parseInt(likelihood.value),
            impact: parseInt(impact.value)
        })
    });

    alert("✅ Risk added");
    loadDashboard();
}

// MANAGE RISKS
async function loadManageRisks() {
    const res = await fetch(API_URL + "/risks/", {
        headers: { Authorization: TOKEN }
    });

    const data = await res.json();
    manageList.innerHTML = "";

    data.forEach(r => {
        const li = document.createElement("li");
        li.innerHTML = `
            ${r.risk_description} (${r.inherent_rating})
            <button onclick="deleteRisk(${r.id})">Delete</button>
        `;
        manageList.appendChild(li);
    });
}

// DELETE
async function deleteRisk(id) {
    await fetch(API_URL + "/risks/" + id, {
        method: "DELETE",
        headers: { Authorization: TOKEN }
    });

    loadManageRisks();
}

// AUDIT LOGS
async function loadAuditLogs() {
    const res = await fetch(API_URL + "/risks/audit", {
        headers: { Authorization: TOKEN }
    });

    const data = await res.json();
    auditList.innerHTML = "";

    data.forEach(a => {
        const li = document.createElement("li");
        li.innerText = `${a.action} | Risk ID: ${a.risk_id}`;
        auditList.appendChild(li);
    });
}

// HEATMAP
async function drawHeatmap() {
    const res = await fetch(API_URL + "/risks/heatmap", {
        headers: { Authorization: TOKEN }
    });

    const data = await res.json();

    new Chart(document.getElementById("heatmapChart"), {
        type: "scatter",
        data: {
            datasets: [{
                data: data.map(r => ({x:r.likelihood,y:r.impact})),
                pointBackgroundColor: "red"
            }]
        }
    });
}

// EXPORT
function downloadReport() {
    window.open(API_URL + "/risks/export");
}

</script>

</body>
</html>
